services:
  mysql:
    image: mysql:8.0
    container_name: confchain-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-confchain_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-confchain}
      MYSQL_USER: ${MYSQL_USER:-confchain}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-confchain}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
